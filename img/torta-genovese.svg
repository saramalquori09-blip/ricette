<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf7f2"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="950" cy="200" r="150" fill="#e8d4c0" opacity="0.15"/>
  
  <!-- Light sponge cake -->
  <circle cx="600" cy="350" r="140" fill="#f5e6d3" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Lemon zest topping -->
  <ellipse cx="600" cy="320" rx="145" ry="35" fill="#ffd700" opacity="0.3"/>
  <circle cx="570" cy="300" r="8" fill="#ffed4e"/>
  <circle cx="600" cy="290" r="7" fill="#ffed4e"/>
  <circle cx="630" cy="298" r="8" fill="#ffed4e"/>
  <circle cx="655" cy="310" r="7" fill="#ffed4e"/>
  
  <!-- Light dust effect -->
  <circle cx="550" cy="320" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="610" cy="330" r="2" fill="#fff" opacity="0.8"/>
  <circle cx="660" cy="325" r="2" fill="#fff" opacity="0.8"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#d4a574" font-weight="bold" font-family="Segoe UI, Arial">Torta alla Genovese</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Delicata al limone</text>
</svg>