<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf5f0"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="150" fill="#8b4513" opacity="0.1"/>
  
  <!-- Round dark cake -->
  <circle cx="600" cy="350" r="140" fill="#3d2817" stroke="#1a0f0a" stroke-width="2"/>
  
  <!-- Chocolate glaze -->
  <ellipse cx="600" cy="320" rx="145" ry="40" fill="#2d1810" opacity="0.7"/>
  
  <!-- Cocoa powder dust -->
  <circle cx="560" cy="300" r="3" fill="#8b4513" opacity="0.8"/>
  <circle cx="590" cy="290" r="2" fill="#8b4513" opacity="0.8"/>
  <circle cx="620" cy="298" r="3" fill="#8b4513" opacity="0.8"/>
  <circle cx="650" cy="305" r="2.5" fill="#8b4513" opacity="0.8"/>
  
  <!-- Almond decoration top -->
  <ellipse cx="540" cy="200" rx="20" ry="15" fill="#d2b48c"/>
  <ellipse cx="660" cy="210" rx="22" ry="16" fill="#d2b48c"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#8b4513" font-weight="bold" font-family="Segoe UI, Arial">Torta Caprese</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Mandorle e cioccolato</text>
</svg>