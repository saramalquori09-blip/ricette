<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricette Casuali - Ispirazione Culinaria</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .random-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .random-button:hover {
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .recipe-container {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border-left: 5px solid #667eea;
            animation: slideIn 0.5s ease;
        }

        .recipe-container.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recipe-title {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .recipe-keyword {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .recipe-section {
            margin-bottom: 20px;
        }

        .section-title {
            color: #764ba2;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 5px;
        }

        .ingredients-list {
            list-style: none;
            padding-left: 0;
        }

        .ingredients-list li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
        }

        .ingredients-list li:before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
            font-size: 1.2em;
        }

        .instructions-list {
            list-style: none;
            counter-reset: step-counter;
            padding-left: 0;
        }

        .instructions-list li {
            counter-increment: step-counter;
            margin-bottom: 15px;
            padding-left: 35px;
            position: relative;
            color: #555;
            line-height: 1.6;
        }

        .instructions-list li:before {
            content: counter(step-counter);
            position: absolute;
            left: 0;
            top: 0;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .time-servings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .time-servings div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-servings strong {
            color: #667eea;
            min-width: 80px;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #fadbd8;
            border-radius: 10px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .featured-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

        .featured-keywords span {
            background: #e8eef7;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .featured-keywords span:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>

        function displayRecipe(recipe) {
            const container = document.getElementById('recipeContainer');
            if (!recipe) {
                document.getElementById('errorMessage').textContent = 'Nessuna ricetta trovata per questa ricerca!';
                document.getElementById('errorMessage').classList.add('active');
                container.classList.remove('active');
                return;
            }

            document.getElementById('errorMessage').classList.remove('active');

            const html = `
                <div class="recipe-keyword">${recipe.keyword.toUpperCase()}</div>
                <h2 class="recipe-title">${recipe.title}</h2>
                
                <div class="time-servings">
                    <div>
                        <strong>⏱️ Tempo:</strong>
                        ${recipe.time}
                    </div>
                    <div>
                        <strong>👥 Porzioni:</strong>
                        ${recipe.servings}
                    </div>
                </div>

                <div class="recipe-section">
                    <h3 class="section-title">📝 Ingredienti</h3>
                    <ul class="ingredients-list">
                        ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                    </ul>
                </div>

                <div class="recipe-section">
                    <h3 class="section-title">👨‍🍳 Preparazione</h3>
                    <ol class="instructions-list">
                        ${recipe.instructions.map(instr => `<li>${instr}</li>`).join('')}
                    </ol>
                </div>
            `;

            container.innerHTML = html;
            container.classList.add('active');
        }

        function searchRecipe() {
            const keyword = document.getElementById('keywordInput').value.toLowerCase().trim();
            if (!keyword) {
                document.getElementById('errorMessage').textContent = 'Per favore inserisci una parola chiave!';
                document.getElementById('errorMessage').classList.add('active');
                return;
            }

            const matching = recipes.filter(r => r.keyword.includes(keyword) || keyword.includes(r.keyword));
            if (matching.length === 0) {
                document.getElementById('errorMessage').textContent = `Nessuna ricetta trovata con la parola "${keyword}". Prova con: pasta, pizza, dolce, verdure, carne, pesce, risotto, zuppa`;
                document.getElementById('errorMessage').classList.add('active');
                document.getElementById('recipeContainer').classList.remove('active');
                return;
            }

            const recipe = matching[Math.floor(Math.random() * matching.length)];
            displayRecipe(recipe);
        }

        function randomRecipe() {
            const recipe = recipes[Math.floor(Math.random() * recipes.length)];
            document.getElementById('keywordInput').value = recipe.keyword;
            displayRecipe(recipe);
        }

        function searchByKeyword(keyword) {
            document.getElementById('keywordInput').value = keyword;
            searchRecipe();
        }

        // Permetti la ricerca con Enter
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRecipe();
            }
        });

        // Mostra una ricetta casuale al caricamento
        window.addEventListener('load', randomRecipe);
    </script>
</body>
</html>
