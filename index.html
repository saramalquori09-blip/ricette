<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolci da Forno - Ricette Casuali</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .random-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .random-button:hover {
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.4);
        }

        .recipe-container {
            display: none;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            border-left: 5px solid #667eea;
            animation: slideIn 0.5s ease;
        }

        .recipe-container.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .recipe-title {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .recipe-keyword {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
            margin-bottom: 15px;
        }

        .recipe-section {
            margin-bottom: 20px;
        }

        .recipe-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 15px;
            border: 1px solid #eee;
        }



        .section-title {
            color: #764ba2;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 10px;
            border-bottom: 2px solid #f5576c;
            padding-bottom: 5px;
        }

        .ingredients-list {
            list-style: none;
            padding-left: 0;
        }

        .ingredients-list li {
            padding: 8px 0;
            color: #555;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
        }

        .ingredients-list li:before {
            content: "✓";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
            font-size: 1.2em;
        }

        .instructions-list {
            list-style: none;
            counter-reset: step-counter;
            padding-left: 0;
        }

        .instructions-list li {
            counter-increment: step-counter;
            margin-bottom: 15px;
            padding-left: 35px;
            position: relative;
            color: #555;
            line-height: 1.6;
        }

        .instructions-list li:before {
            content: counter(step-counter);
            position: absolute;
            left: 0;
            top: 0;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9em;
        }

        .time-servings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: white;
            border-radius: 10px;
        }

        .time-servings div {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .time-servings strong {
            color: #667eea;
            min-width: 80px;
        }

        .error-message {
            color: #e74c3c;
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: #fadbd8;
            border-radius: 10px;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .featured-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }

        .featured-keywords span {
            background: #e8eef7;
            color: #667eea;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .featured-keywords span:hover {
            background: #667eea;
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍳 Ricette Casuali</h1>
        <p class="subtitle">Dolci classici da forno, veloci e facili — lasciati ispirare!</p>

        <div class="search-box">
            <input type="text" id="keywordInput" placeholder="Cerca dolci da forno (es: ciambellone, crostata, muffin)..." />
            <button onclick="searchRecipe()">Cerca</button>
            <button class="random-button" onclick="randomDolce()">🎲 Dolce Casuale</button>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="recipe-container" id="recipeContainer"></div>

        <div class="featured-keywords">
            <strong style="width: 100%; color: #333;">Suggerimenti da forno:</strong>
            <span onclick="searchByKeyword('ciambellone')">Ciambellone</span>
            <span onclick="searchByKeyword('crostata')">Crostata</span>
            <span onclick="searchByKeyword('plumcake')">Plumcake</span>
            <span onclick="searchByKeyword('muffin')">Muffin</span>
            <span onclick="searchByKeyword('biscotti')">Biscotti</span>
            <span onclick="randomDolce()">🎲 Dolce Casuale</span>
        </div>
    </div>

    <script>
        const recipes = (function() {
            // basi di dolci da forno classici e veloci
            const bases = [
                { name: 'Ciambellone', bakeTime: '30-40 min', servings: '8 fette' },
                { name: 'Crostata', bakeTime: '25-35 min', servings: '8 fette' },
                { name: 'Plumcake', bakeTime: '35-45 min', servings: '8 fette' },
                { name: 'Torta allo Yogurt', bakeTime: '35-40 min', servings: '8 fette' },
                { name: 'Muffin', bakeTime: '18-22 min', servings: '6 pezzi' },
                { name: 'Biscotti', bakeTime: '10-15 min', servings: '12 pezzi' },
                { name: 'Brownies', bakeTime: '20-25 min', servings: '9 pezzi' },
                { name: 'Madeleine', bakeTime: '10-12 min', servings: '12 pezzi' },
                { name: 'Tortine Mono Porzione', bakeTime: '18-22 min', servings: '4 pezzi' },
                { name: 'Sbrisolona', bakeTime: '25-30 min', servings: '8 pezzi' }
            ];

            // rimosse varianti con cocco o esotiche
            const variants = ['classico','al cioccolato','al limone','alla marmellata','alla ricotta','alle mele','alla banana','alle fragole','alla nocciola','con gocce di cioccolato','allo yogurt'];

            const baseIngredients = {
                'Ciambellone': ['300g farina', '180g zucchero', '3 uova', '120ml olio', '200ml latte', '1 bustina lievito', 'Scorza di limone'],
                'Crostata': ['300g farina', '150g burro freddo', '100g zucchero', '2 uova', 'marmellata q.b.'],
                'Plumcake': ['250g farina', '150g zucchero', '3 uova', '100ml olio', '150ml yogurt', '1 bustina lievito'],
                'Torta allo Yogurt': ['1 vasetto yogurt (125g)', '2 vasetti zucchero', '3 vasetti farina', '1 vasetto olio', '3 uova', '1 bustina lievito'],
                'Muffin': ['200g farina', '120g zucchero', '1 uovo', '120ml latte', '80ml olio', '1 bustina lievito'],
                'Biscotti': ['300g farina', '120g zucchero', '120g burro', '1 uovo', '1 pizzico sale'],
                'Brownies': ['200g cioccolato', '150g burro', '150g zucchero', '3 uova', '100g farina'],
                'Madeleine': ['100g farina', '100g zucchero', '2 uova', '80g burro fuso', 'Scorza di limone'],
                'Tortine Mono Porzione': ['150g farina', '100g zucchero', '2 uova', '100ml latte', '50ml olio', '1 bustina lievito'],
                'Sbrisolona': ['300g farina', '150g zucchero', '150g burro', '100g farina di mandorle']
            };

            const recipes = [];

            // Genera istruzioni dettagliate in base al tipo di dolce
            function generateInstructions(baseName, variant, ingredientsList) {
                const steps = [];
                // consigli generali utilizzabili in fondo
                const generalTips = [
                    'Consiglio: pesa sempre gli ingredienti per risultati costanti.',
                    'Usa ingredienti a temperatura ambiente (uova, latte) per impasti più omogenei.',
                    'Non aprire il forno nei primi 2/3 della cottura per evitare che il dolce si afflosci.',
                    'Controlla la cottura con uno stecchino: deve uscire con poche briciole umide, non completamente bagnato.'
                ];

                if (baseName === 'Ciambellone') {
                    steps.push('Prepara: imburra e infarina uno stampo a ciambella da 22-24 cm o usa staccante spray.');
                    steps.push('Ingredienti: porta a temperatura ambiente 3 uova e 200 ml di latte; grattugia la scorza di 1 limone.');
                    steps.push('Montaggio: monta le uova con 180 g di zucchero per almeno 8-10 minuti fino a ottenere un nastro chiaro e arioso.');
                    steps.push('Incorporazione grassi: aggiungi 120 ml di olio a filo mentre monti a bassa velocità, poi il latte e la scorza.');
                    steps.push('Setaccia insieme 300 g di farina e 1 bustina di lievito; incorpora in 2-3 riprese mescolando dal basso verso l\'alto per non smontare il composto.');
                    steps.push('Versa nello stampo, livella con una spatola e sbatti leggermente lo stampo sul piano per eliminare bolle d\'aria.');
                    steps.push('Cottura: cuoci in forno statico a 180°C (ventilato 160-170°C) per 30-40 minuti; controlla dopo 30 minuti con stecchino.');
                    steps.push('Riposo: lascia raffreddare 10 min nello stampo, poi sforma su una gratella; attendi che sia completamente tiepido prima di tagliare.');
                    steps.push('Conservazione: mantenere coperto a temperatura ambiente per 2-3 giorni o congelare a fette per 1 mese.');
                    steps.push(...generalTips);
                    return steps;
                }

                if (baseName === 'Crostata') {
                    steps.push('Prepara la pasta frolla: lavora 300 g farina con 150 g burro freddo fino a sabbiare.');
                    steps.push('Aggiungi 100 g zucchero e 2 tuorli; impasta velocemente fino a ottenere una palla liscia.');
                    steps.push('Riposo: avvolgi nella pellicola e lascia in frigo 30-60 minuti per rilassare il glutine.');
                    steps.push('Stesura: stendi i 2/3 della frolla su un piano leggermente infarinato e fodera una tortiera da 24 cm.');
                    steps.push('Ripieno: usa 250-300 g di marmellata densa; non eccedere per evitare che coli in cottura.');
                    steps.push('Griglia: forma strisce regolari per la copertura e sigilla i bordi con una leggera pressione.');
                    steps.push('Cottura: forno a 180°C per 25-30 minuti fino a doratura uniforme; se la superficie scurisce troppo, copri con carta alluminio.');
                    steps.push('Raffreddamento: lascia raffreddare completamente prima di tagliare per ottenere fette pulite.');
                    steps.push('Conservazione: si mantiene 3-4 giorni a temperatura ambiente, meglio se coperta.');
                    steps.push(...generalTips);
                    return steps;
                }

                if (baseName === 'Plumcake' || baseName === 'Torta allo Yogurt') {
                    steps.push('Preparazione: preriscalda il forno a 180°C e imburra/infarina uno stampo da plumcake (o usa carta forno).');
                    steps.push('Ingredienti: porta a temperatura ambiente 3 uova, 150-200 g di zucchero e 150 ml di olio o 1 vasetto di yogurt.');
                    steps.push('Mescola gli umidi: yogurt, olio e uova fino a omogeneizzare.');
                    steps.push('Setaccia farina e lievito e incorpora gradualmente agli umidi con movimenti lenti.');
                    steps.push('Aggiunte: unisci frutta fresca a pezzetti o gocce di cioccolato infarinate per evitare che affondino.');
                    steps.push('Cottura: versa nello stampo e cuoci 35-45 minuti; se la superficie scurisce troppo, abbassa il forno a 170°C e copri con alluminio.');
                    steps.push('Controllo: inserisci uno stecchino al centro: deve uscire con poche briciole umide.');
                    steps.push('Raffredda su gratella; per fette regolari, aspetta che sia quasi freddo.');
                    steps.push('Conservazione: mantiene morbidezza per 2-3 giorni in contenitore ermetico.');
                    steps.push(...generalTips);
                    return steps;
                }

                if (baseName === 'Muffin') {
                    steps.push('Prepara: preriscalda il forno a 200°C e prepara pirottini nello stampo da muffin.');
                    steps.push('Ingredienti secchi: setaccia 200 g farina, 1 bustina di lievito e 120 g zucchero con un pizzico di sale.');
                    steps.push('Ingredienti umidi: sbatti 1 uovo con 120 ml latte e 80 ml olio o 100 g burro fuso.');
                    steps.push('Unisci umidi e secchi solo il necessario: l\'impasto deve rimanere leggermente grumoso per muffin soffici.');
                    steps.push('Riempi i pirottini per 2/3, aggiungi topping se desideri (zucchero di canna, crumble).');
                    steps.push('Cottura: 18-22 minuti, controlla la doratura e prova stecchino.');
                    steps.push('Raffreddamento: lascia 5 minuti nello stampo, poi trasferisci su gratella.');
                    steps.push(...generalTips);
                    return steps;
                }

                if (baseName === 'Biscotti') {
                    steps.push('Prepara impasto: lavora 120 g burro morbido con 120 g zucchero fino a crema.');
                    steps.push('Aggiungi 1 uovo e aromi, poi incorpora 300 g farina fino ad ottenere impasto compatto.');
                    steps.push('Riposa in frigo 30 minuti, poi stendi e ritaglia con formine.');
                    steps.push('Cuoci in forno a 170°C per 10-15 minuti fino a leggera doratura ai bordi.');
                    steps.push('Raffredda e conserva in scatola metallica per mantenerli croccanti.');
                    steps.push(...generalTips);
                    return steps;
                }

                if (baseName === 'Brownies') {
                    steps.push('Prepara teglia quadrata e fodera con carta forno.');
                    steps.push('Sciogli 200 g cioccolato fondente e 150 g burro a bagnomaria o al microonde a bassa potenza.');
                    steps.push('Sbatti 3 uova con 150 g zucchero fino a leggero aumento di volume, poi incorpora il cioccolato.');
                    steps.push('Aggiungi 100 g farina setacciata con movimenti delicati per mantenere la struttura umida.');
                    steps.push('Cuoci 20-25 minuti: il centro deve essere ancora morbido ma non liquido.');
                    steps.push('Raffredda completamente; per tagli netti, refrigerare 1 ora prima di affettare.');
                    steps.push(...generalTips);
                    return steps;
                }

                // fallback dettagliato generico
                steps.push('Preriscalda il forno alla temperatura indicata nella ricetta.');
                steps.push('Pesa tutti gli ingredienti e porta a temperatura ambiente quelli indicati.');
                steps.push('Setaccia gli ingredienti secchi e mescolali; prepara gli umidi in un\'altra ciotola.');
                steps.push('Unisci gli ingredienti in più riprese, mescolando il minimo necessario per evitare di sviluppare troppo glutine.');
                steps.push('Versa nello stampo e cuoci per il tempo indicato, controllando la cottura con uno stecchino.');
                steps.push('Lascia riposare nello stampo qualche minuto, poi trasferisci su una gratella per raffreddare completamente.');
                steps.push(...generalTips);
                return steps;
            }

            // Aggiungi alcune ricette classiche fisse
            // classics with detailed procedures
            const classics = [
                { keyword: 'dolce', title: 'Ciambellone classico', image: 'img/ciambellone.svg', description: 'Il tipico ciambellone della nonna, soffice e profumato al limone.', time: '35-40 min', servings: '8 fette', ingredients: baseIngredients['Ciambellone'], instructions: [
                    'Preriscalda il forno a 180°C. Imburra e infarina uno stampo a ciambella da 24 cm.',
                    'Grattugia la scorza di 1 limone e spremine il succo; tienili da parte.',
                    'In una ciotola capiente sbatti le uova con lo zucchero fino a ottenere un composto chiaro e spumoso (8-10 minuti con frusta elettrica).',
                    'Aggiungi l\'olio a filo continuando a montare, poi incorpora il latte e il succo di limone.',
                    'Setaccia la farina con il lievito e incorporala poco per volta, mescolando dal basso verso l\'alto per non smontare il composto.',
                    'Versa l\'impasto nello stampo e livella la superficie con una spatola.',
                    'Cuoci in forno a 180°C per 30-40 minuti controllando la cottura con uno stecchino (deve uscire asciutto).',
                    'Sforna, lascia intiepidire 10 minuti nello stampo quindi capovolgi e fai raffreddare su una griglia.',
                    'Spolvera con zucchero a velo prima di servire.'
                ] },
                { keyword: 'dolce', title: 'Crostata alla marmellata', image: 'img/crostata.svg', description: 'La crostata croccante con cuore di marmellata fatta in casa.', time: '40-50 min', servings: '8 fette', ingredients: baseIngredients['Crostata'], instructions: [
                    'Prepara la pasta frolla: lavora farina e zucchero con il burro freddo fino a ottenere un composto sabbioso.',
                    'Aggiungi le uova e impasta velocemente fino a ottenere una palla liscia; avvolgila nella pellicola e lascia riposare in frigo 30 minuti.',
                    'Stendi i 2/3 della frolla su un piano infarinato e fodera una tortiera da 24 cm, facendo un piccolo bordo.',
                    'Buca il fondo con una forchetta e spalma la marmellata (non troppo liquida) in modo uniforme.',
                    'Stendi il resto della frolla e crea le strisce per la griglia superiore; decora la crostata.',
                    'Cuoci in forno preriscaldato a 180°C per 25-30 minuti fino a doratura.',
                    'Lascia raffreddare completamente prima di sformare e servire per evitare che il ripieno colli.'
                ] },
                { keyword: 'dolce', title: 'Plumcake allo yogurt', image: 'img/plumcake.svg', description: 'Plumcake morbidissimo allo yogurt perfetto per una merenda leggera.', time: '40-50 min', servings: '8 fette', ingredients: baseIngredients['Plumcake'], instructions: [
                    'Preriscalda il forno a 180°C e imburra uno stampo da plumcake.',
                    'In una ciotola mescola yogurt, olio e uova fino a ottenere un composto omogeneo.',
                    'In un\'altra ciotola setaccia farina e lievito, aggiungi lo zucchero.',
                    'Unisci gli ingredienti secchi a quelli umidi in più riprese, mescolando solo il necessario.',
                    'Aggiungi eventuali pezzetti di frutta o scaglie di cioccolato se graditi.',
                    'Versa l\'impasto nello stampo e inforna per 35-45 minuti; verifica con stecchino.',
                    'Raffredda su una gratella prima di tagliare a fette.'
                ] }
            ];

            classics.forEach(r => recipes.push(r));

            let i = 0;
            while (recipes.length < 100) {
                const base = bases[i % bases.length];
                const variant = variants[i % variants.length];
                const title = `${base.name} ${variant}`.replace(/\s+/g,' ').trim();
                const ingr = (baseIngredients[base.name] || ['200g farina','100g zucchero','2 uova']).slice();

                // aggiunte semplici a ingredienti per la variante
                if (variant.includes('banana')) ingr.push('1 banana schiacciata');
                if (variant.includes('cioccolato') || variant.includes('gocce')) ingr.push('50g cioccolato');
                if (variant.includes('limone')) ingr.push('Scorza di limone');
                if (variant.includes('marmellata')) ingr.push('Marmellata q.b.');
                if (variant.includes('miele')) ingr.push('1 cucchiaio miele');
                if (variant.includes('nocciola') || variant.includes('pistacchio')) ingr.push('30g frutta secca tritata');
                if (variant.includes('cocco')) ingr.push('30g cocco grattugiato');

                const instructions = generateInstructions(base.name, variant, ingr);

                // build a simple description summarizing ingredients
                const descIngredients = ingr.slice(0,3).join(', ');
                recipes.push({
                    keyword: 'dolce',
                    title,
                    description: `Un dolce facile e veloce: ${title}. Gli ingredienti principali sono ${descIngredients}, perfetto per la colazione o merenda.`,
                    time: base.bakeTime,
                    servings: base.servings,
                    ingredients: ingr,
                    instructions
                });

                i++;
            }

            return recipes;
        })();

        let currentRecipe = null;

        function getImageFor(recipe) {
            // crea SVG più ricco con emoji e sfondo colorato
            function svgToDataUri(svg) {
                try {
                    return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
                } catch (e) {
                    return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
                }
            }

            const emoji = '🧁';
            const title = (recipe.title || 'Dolce').replace(/&/g, '&amp;');
            const subtitle = 'Dolce da forno semplice e casalingo';
            // colori diversi per varietà
            const bg = '#f7f2eb';
            const accent = '#667eea';

            const svg = `<?xml version="1.0" encoding="UTF-8"?>\n` +
                `<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='800' viewBox='0 0 1200 800'>` +
                `<defs><linearGradient id='g' x1='0' x2='1'><stop offset='0' stop-color='${bg}'/><stop offset='1' stop-color='#fff'/></linearGradient></defs>` +
                `<rect width='1200' height='800' fill='url(#g)'/>` +
                `<circle cx='200' cy='200' r='140' fill='${accent}' opacity='0.08'/>` +
                `<text x='50%' y='35%' font-size='80' text-anchor='middle' fill='${accent}' font-family='Segoe UI, Arial, sans-serif'>${emoji}</text>` +
                `<text x='50%' y='55%' font-size='48' text-anchor='middle' fill='${accent}' font-family='Segoe UI, Arial, sans-serif' font-weight='700'>${title}</text>` +
                `<text x='50%' y='66%' font-size='24' text-anchor='middle' fill='#333' font-family='Segoe UI, Arial, sans-serif'>${subtitle}</text>` +
                `</svg>`;

            return svgToDataUri(svg);
        }

        function displayRecipe(recipe) {
            const container = document.getElementById('recipeContainer');
            if (!recipe) {
                document.getElementById('errorMessage').textContent = 'Nessuna ricetta trovata per questa ricerca!';
                document.getElementById('errorMessage').classList.add('active');
                container.classList.remove('active');
                return;
            }

            currentRecipe = recipe;
            document.getElementById('errorMessage').classList.remove('active');

            const imgUrl = recipe.image || getImageFor(recipe);

            const html = `
                <div class="recipe-keyword">${recipe.keyword.toUpperCase()}</div>
                <h2 class="recipe-title">${recipe.title}</h2>
                <p class="recipe-description">${recipe.description || 'Un dolce semplice e delizioso, perfetto per la colazione o come merenda.'}</p>
                <a href="${imgUrl}" target="_blank" rel="noopener">
                    <img class="recipe-image" src="${imgUrl}" alt="${recipe.title}" />
                </a>
                
                <div class="time-servings">
                    <div>
                        <strong>⏱️ Tempo:</strong>
                        ${recipe.time}
                    </div>
                    <div>
                        <strong>👥 Porzioni:</strong>
                        ${recipe.servings}
                    </div>
                </div>

                <div class="recipe-section">
                    <h3 class="section-title">📝 Ingredienti</h3>
                    <ul class="ingredients-list">
                        ${recipe.ingredients.map(ing => `<li>${ing}</li>`).join('')}
                    </ul>
                </div>

                <div class="recipe-section">
                    <h3 class="section-title">👨‍🍳 Preparazione</h3>
                    <ol class="instructions-list">
                        ${recipe.instructions.map(instr => `<li>${instr}</li>`).join('')}
                    </ol>
                </div>
            `;

            container.innerHTML = html;
            container.classList.add('active');
        }

        function searchRecipe() {
            const keyword = document.getElementById('keywordInput').value.toLowerCase().trim();
            const pool = recipes; // ricerca universale su tutte le ricette

            if (!keyword) {
                // se vuoto, mostra una ricetta casuale da tutto il catalogo
                const recipe = pool[Math.floor(Math.random() * pool.length)];
                displayRecipe(recipe);
                return;
            }

            const matching = pool.filter(r => r.title.toLowerCase().includes(keyword) || r.ingredients.join(' ').toLowerCase().includes(keyword) || r.keyword.includes(keyword));
            if (matching.length === 0) {
                document.getElementById('errorMessage').textContent = `Nessuna ricetta trovata con la parola "${keyword}". Prova: ciambellone, crostata, plumcake, muffin`;
                document.getElementById('errorMessage').classList.add('active');
                document.getElementById('recipeContainer').classList.remove('active');
                return;
            }

            const recipe = matching[Math.floor(Math.random() * matching.length)];
            displayRecipe(recipe);
        }

        function randomDolce() {
            const pool = recipes.filter(r => r.keyword === 'dolce' || r.keyword === 'colazione');
            const recipe = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('keywordInput').value = recipe.title;
            displayRecipe(recipe);
        }

        function randomAll() {
            const recipe = recipes[Math.floor(Math.random() * recipes.length)];
            document.getElementById('keywordInput').value = recipe.title;
            displayRecipe(recipe);
        }

        function searchByKeyword(keyword) {
            document.getElementById('keywordInput').value = keyword;
            searchRecipe();
        }

        // Permetti la ricerca con Enter
        document.getElementById('keywordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchRecipe();
            }
        });

        // Mostra una ricetta dolce/colazione casuale al caricamento
        window.addEventListener('load', randomDolce);


    </script>
</body>
</html>
