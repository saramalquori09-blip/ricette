<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf6f1"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="950" cy="200" r="150" fill="#8b6f47" opacity="0.1"/>
  
  <!-- Plumcake with dried fruits -->
  <rect x="420" y="260" width="360" height="240" rx="12" fill="#d4a574" stroke="#8b6f47" stroke-width="2"/>
  
  <!-- Candied fruit decorations -->
  <circle cx="480" cy="290" r="18" fill="#ff6b6b"/>
  <circle cx="540" cy="295" r="20" fill="#ffd93d"/>
  <circle cx="600" cy="285" r="18" fill="#ff1744"/>
  <circle cx="660" cy="295" r="22" fill="#ffb300"/>
  <circle cx="720" cy="290" r="20" fill="#ff6b6b"/>
  
  <!-- Dried fruit scattered -->
  <circle cx="500" cy="380" r="12" fill="#8b4513" opacity="0.6"/>
  <circle cx="570" cy="400" r="10" fill="#a0522d" opacity="0.6"/>
  <circle cx="640" cy="390" r="12" fill="#8b4513" opacity="0.6"/>
  <circle cx="710" cy="405" r="11" fill="#a0522d" opacity="0.6"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#8b6f47" font-weight="bold" font-family="Segoe UI, Arial">Plum-cake Classico</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Con uvetta e frutta candita</text>
</svg>