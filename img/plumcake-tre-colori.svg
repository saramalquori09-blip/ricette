<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf8f5"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="150" fill="#6b4}" opacity="0.08"/>
  
  <!-- Three-striped plumcake -->
  <rect x="400" y="260" width="400" height="250" rx="10" fill="#90EE90" stroke="#2d5016" stroke-width="2"/>
  <rect x="410" y="270" width="130" height="230" rx="5" fill="#90EE90"/>
  <rect x="545" y="270" width="130" height="230" rx="5" fill="#d4a373"/>
  <rect x="680" y="270" width="130" height="230" rx="5" fill="#3d2817"/>
  
  <!-- Almond seeds in green section -->
  <circle cx="430" cy="310" r="5" fill="#f5deb3" opacity="0.8"/>
  <circle cx="450" cy="330" r="5" fill="#f5deb3" opacity="0.8"/>
  <circle cx="470" cy="315" r="5" fill="#f5deb3" opacity="0.8"/>
  
  <!-- Pistachio in middle section -->
  <circle cx="585" cy="320" r="5" fill="#e8d4c0" opacity="0.8"/>
  <circle cx="565" cy="340" r="5" fill="#e8d4c0" opacity="0.8"/>
  <circle cx="605" cy="335" r="5" fill="#e8d4c0" opacity="0.8"/>
  
  <!-- Cocoa in brown section -->
  <circle cx="710" cy="310" r="4" fill="#e8d4c0" opacity="0.7"/>
  <circle cx="725" cy="328" r="4" fill="#e8d4c0" opacity="0.7"/>
  <circle cx="740" cy="318" r="4" fill="#e8d4c0" opacity="0.7"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#6b4423" font-weight="bold" font-family="Segoe UI, Arial">Plum-cake Tre Colori</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Mandorle, pistacchio e cacao</text>
</svg>