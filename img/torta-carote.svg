<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf6f1"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="950" cy="200" r="150" fill="#ff8c00" opacity="0.1"/>
  
  <!-- Orange-hued cake -->
  <circle cx="600" cy="350" r="140" fill="#ff9d6f" stroke="#ff6b35" stroke-width="2"/>
  
  <!-- Walnut pieces on top -->
  <ellipse cx="550" cy="240" rx="18" ry="22" fill="#8b6f47"/>
  <ellipse cx="600" cy="220" rx="20" ry="25" fill="#a0826d"/>
  <ellipse cx="650" cy="235" rx="18" ry="23" fill="#8b6f47"/>
  
  <!-- Walnut scattered -->
  <circle cx="560" cy="340" r="10" fill="#8b6f47" opacity="0.7"/>
  <circle cx="620" cy="360" r="9" fill="#a0826d" opacity="0.7"/>
  <circle cx="680" cy="345" r="8" fill="#8b6f47" opacity="0.7"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#ff6b35" font-weight="bold" font-family="Segoe UI, Arial">Torta di Carote</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Con noci e scorza di limone</text>
</svg>