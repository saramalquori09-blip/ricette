<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="950" cy="200" r="150" fill="#ffa500" opacity="0.1"/>
  
  <!-- Cake with orange tone -->
  <circle cx="600" cy="350" r="140" fill="#ffc27d" stroke="#ffa500" stroke-width="2"/>
  
  <!-- Orange slice decorations -->
  <circle cx="600" cy="260" r="35" fill="#ff9800" opacity="0.3"/>
  <circle cx="600" cy="260" r="30" fill="none" stroke="#ffa500" stroke-width="2"/>
  <line x1="600" y1="230" x2="600" y2="290" stroke="#ffa500" stroke-width="1" opacity="0.5"/>
  <line x1="570" y1="245" x2="630" y2="275" stroke="#ffa500" stroke-width="1" opacity="0.5"/>
  <line x1="630" y1="245" x2="570" y2="275" stroke="#ffa500" stroke-width="1" opacity="0.5"/>
  
  <!-- Pine nuts -->
  <ellipse cx="540" cy="320" rx="8" ry="12" fill="#f4d4a0"/>
  <ellipse cx="570" cy="330" rx="8" ry="12" fill="#f4d4a0" transform="rotate(-20 570 330)"/>
  <ellipse cx="630" cy="335" rx="8" ry="12" fill="#f4d4a0" transform="rotate(25 630 335)"/>
  <ellipse cx="660" cy="320" rx="8" ry="12" fill="#f4d4a0" transform="rotate(-15 660 320)"/>
  
  <!-- Candied citrus -->
  <circle cx="520" cy="260" r="7" fill="#ffb74d"/>
  <circle cx="680" cy="280" r="7" fill="#ffb74d"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#ffa500" font-weight="bold" font-family="Segoe UI, Arial">Torta all'Arancia</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Con pinoli e cedro candito</text>
</svg>