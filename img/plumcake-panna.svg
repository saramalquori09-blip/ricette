<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf6f0"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="150" fill="#f5d5b8" opacity="0.15"/>
  
  <!-- Plumcake shape -->
  <rect x="450" y="250" width="300" height="250" rx="10" fill="#e8d4c0" stroke="#d4a574" stroke-width="2"/>
  
  <!-- Whipped cream on top -->
  <ellipse cx="600" cy="240" rx="160" ry="50" fill="#fff9f5"/>
  <circle cx="550" cy="200" r="35" fill="#fff"/>
  <circle cx="570" cy="190" r="28" fill="#fff"/>
  <circle cx="590" cy="185" r="32" fill="#fff"/>
  <circle cx="620" cy="190" r="30" fill="#fff"/>
  <circle cx="640" cy="195" r="35" fill="#fff"/>
  <circle cx="660" cy="205" r="32" fill="#fff"/>
  
  <!-- Lemon zest garnish -->
  <circle cx="520" cy="165" r="12" fill="#ffd700"/>
  <circle cx="680" cy="170" r="12" fill="#ffd700"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#c9a876" font-weight="bold" font-family="Segoe UI, Arial">Plum-cake alla Panna</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Dolce, profumato al limone</text>
</svg>