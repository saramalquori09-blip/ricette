<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bgGrad" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#faf5f0"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <circle cx="200" cy="200" r="150" fill="#8b4513" opacity="0.12"/>
  
  <!-- Dark chocolate cake -->
  <circle cx="600" cy="350" r="140" fill="#4a2511" stroke="#2d1508" stroke-width="2"/>
  
  <!-- Cocoa dusting -->
  <ellipse cx="600" cy="320" rx="145" ry="40" fill="#8b4513" opacity="0.4"/>
  
  <!-- Texture/cocoa powder effect -->
  <circle cx="550" cy="310" r="2" fill="#d4a574" opacity="0.6"/>
  <circle cx="580" cy="300" r="1.5" fill="#d4a574" opacity="0.6"/>
  <circle cx="610" cy="305" r="2" fill="#d4a574" opacity="0.6"/>
  <circle cx="640" cy="315" r="1.5" fill="#d4a574" opacity="0.6"/>
  <circle cx="660" cy="320" r="2" fill="#d4a574" opacity="0.6"/>
  
  <!-- Yogurt white accent -->
  <circle cx="530" cy="250" r="12" fill="#f5f5f5"/>
  <circle cx="670" cy="260" r="12" fill="#f5f5f5"/>
  
  <!-- Text -->
  <text x="600" y="580" font-size="48" text-anchor="middle" fill="#8b4513" font-weight="bold" font-family="Segoe UI, Arial">Torta Cacao e Yogurt</text>
  <text x="600" y="620" font-size="28" text-anchor="middle" fill="#999" font-family="Segoe UI, Arial">Umida e vellutata</text>
</svg>